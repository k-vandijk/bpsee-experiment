# docker-compose.yml — local development with SQL Server
# Usage:
#   docker compose up --build
#
# Connection strings are injected via environment variables which override appsettings.json.
# ASP.NET Core maps  ConnectionStrings__UsersDb  →  ConnectionStrings:UsersDb

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Bpsee_Experiment_2024!"
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Bpsee_Experiment_2024!" -Q "SELECT 1" -C
      interval: 10s
      timeout: 5s
      retries: 10

  users:
    build:
      context: .
      dockerfile: BPSEE.Experiment.Microservices.Users/Dockerfile
    ports:
      - "5257:8080"
    environment:
      ConnectionStrings__UsersDb: "Server=sqlserver;Database=sqldb-bpsee-users;User Id=sa;Password=Bpsee_Experiment_2024!;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy

  products:
    build:
      context: .
      dockerfile: BPSEE.Experiment.Microservices.Products/Dockerfile
    ports:
      - "5229:8080"
    environment:
      ConnectionStrings__ProductsDb: "Server=sqlserver;Database=sqldb-bpsee-products;User Id=sa;Password=Bpsee_Experiment_2024!;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy

  orders:
    build:
      context: .
      dockerfile: BPSEE.Experiment.Microservices.Orders/Dockerfile
    ports:
      - "5264:8080"
    environment:
      ConnectionStrings__OrdersDb: "Server=sqlserver;Database=sqldb-bpsee-orders;User Id=sa;Password=Bpsee_Experiment_2024!;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
